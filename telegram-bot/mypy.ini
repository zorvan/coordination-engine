# Local mypy configuration — use from telegram-bot root:
#   python -m mypy .
#
[mypy]
python_version = 3.12
explicit_package_bases = True
namespace_packages = True
mypy_path = .

# Third-party libs without stubs
[mypy-telegram.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-httpx.*]
ignore_missing_imports = True

# Large handler modules: SQLAlchemy Column vs int, optional Telegram updates, user_data dicts
[mypy-bot.handlers.mentions]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-bot.commands.event_creation]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined, misc, operator

# coordination_engine: Telegram types, context.bot_data, query.message are inherently dynamic
[mypy-coordination_engine.main]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.mention_handler]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.command_handlers]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.presentation.event_flow_handler]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.infrastructure.telegram_adapter]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.infrastructure.persistence]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

[mypy-coordination_engine.bootstrap]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined

# coordination_engine application: IEventStore UoW protocol, domain event id types
[mypy-coordination_engine.application.commands]
disable_error_code = attr-defined, arg-type

[mypy-coordination_engine.application.services]
disable_error_code = arg-type

[mypy-coordination_engine.infrastructure.persistence]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined, var-annotated

[mypy-coordination_engine.main]
disable_error_code = union-attr, arg-type, index, assignment, attr-defined, call-arg

# ai/ legacy: SQLAlchemy Column types
[mypy-ai.*]
disable_error_code = union-attr, arg-type, type-var, misc, call-arg

# db/models: SQLAlchemy Column types
[mypy-db.models]
disable_error_code = var-annotated, union-attr
